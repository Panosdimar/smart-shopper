name: Fetch CH Supermarket Offers

on:
  schedule:
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  fetch-ch-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase anthropic pdf2image pillow

      - name: Install poppler
        run: sudo apt-get install -y poppler-utils

      - name: Fetch CH offers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > /tmp/fetch_ch.py << 'ENDOFSCRIPT'
          import os,re,json,requests,base64,anthropic
          from supabase import create_client
          from datetime import datetime,timedelta
          from pdf2image import convert_from_bytes

          sb=create_client(os.environ["SUPABASE_URL"],os.environ["SUPABASE_KEY"])
          ai=anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          SB_URL=os.environ["SUPABASE_URL"]
          SB_KEY=os.environ["SUPABASE_KEY"]

          def get_week_number():
            return datetime.utcnow().isocalendar()[1]

          def download_migros_pdf():
            week=get_week_number()
            year=datetime.utcnow().year
            urls=[
              f"https://assets.issuu.com/v1/api/download/m-magazin/migros-wochenflyer-{week}-{year}-d-aa/pdf",
              f"https://assets.issuu.com/v1/api/download/m-magazin/migros-wochenflyer-{week:02d}-{year}-d-aa/pdf",
            ]
            for url in urls:
              try:
                r=requests.get(url,timeout=30,headers={"User-Agent":"Mozilla/5.0"})
                print("PDF status "+url[-30:]+": "+str(r.status_code))
                if r.status_code==200 and len(r.content)>10000:
                  return r.content
              except Exception as e: print("PDF err:"+str(e))
            return None

          def download_coop_pdf():
            week=get_week_number()
            year=datetime.utcnow().year
            urls=[
              f"https://www.coop.ch/content/dam/coop/prospekte/coop-prospekt-{week}-{year}.pdf",
              f"https://www.coop.ch/content/dam/coop/prospekte/prospekt-{week}-{year}.pdf",
            ]
            for url in urls:
              try:
                r=requests.get(url,timeout=30,headers={"User-Agent":"Mozilla/5.0"})
                print("Coop PDF status: "+str(r.status_code))
                if r.status_code==200 and len(r.content)>10000:
                  return r.content
              except Exception as e: print("Coop PDF err:"+str(e))
            return None

          def pdf_to_images(pdf_bytes,max_pages=8):
            try:
              images=convert_from_bytes(pdf_bytes,dpi=100,first_page=1,last_page=max_pages)
              return images
            except Exception as e:
              print("Convert err:"+str(e))
              return []

          def image_to_base64(img):
            import io
            buf=io.BytesIO()
            img.save(buf,format="JPEG",quality=70)
            return base64.b64encode(buf.getvalue()).decode()

          def extract_offers_from_image(img_b64,store_name,currency):
            try:
              msg=ai.messages.create(
                model="claude-haiku-4-5-20251001",
                max_tokens=2000,
                messages=[{
                  "role":"user",
                  "content":[
                    {"type":"image","source":{"type":"base64","media_type":"image/jpeg","data":img_b64}},
                    {"type":"text","text":f"This is a {store_name} supermarket flyer page. Extract ALL products with prices. Return ONLY valid JSON array: [{{\"name\":\"product name\",\"price\":1.99,\"unit\":\"kg or L or pcs\",\"old_price\":2.99}}]. Include only food/grocery items. Use {currency} prices as numbers only. Max 15 items per page."}
                  ]
                }]
              )
              raw=msg.content[0].text.strip()
              raw=re.sub("```json|```","",raw).strip()
              m=re.search(r"\[.*\]",raw,re.DOTALL)
              if m: return json.loads(m.group(0))
            except Exception as e: print("AI err:"+str(e))
            return []

          def upload_placeholder(store_id,product_id):
            return ""

          def save_offers(offers_list,store_id,store_name,flag,currency):
            if not offers_list: return 0
            rows=[]
            seen=set()
            week_end=(datetime.utcnow()+timedelta(days=7)).strftime("%Y-%m-%d")
            for item in offers_list:
              name=item.get("name","")
              price=float(item.get("price",0) or 0)
              if not name or not price: continue
              old_price=float(item.get("old_price") or price)
              unit=str(item.get("unit","pcs"))
              pid=re.sub("[^a-z0-9]+","_",name.lower()).strip("_")[:50]
              if pid+"_"+store_id in seen: continue
              seen.add(pid+"_"+store_id)
              rows.append({
                "store_id":store_id,"store_name":store_name,"store_flag":flag,
                "product_id":pid,"product_name":name,"price":price,
                "old_price":old_price,"offer_id":"","image_url":"",
                "currency":currency,"unit":unit,"valid_until":week_end,
                "created_at":datetime.utcnow().isoformat()
              })
            if rows:
              sb.table("prices").delete().eq("store_id",store_id).execute()
              sb.table("prices").insert(rows).execute()
              print("Saved "+str(len(rows))+" "+store_name+" offers!")
            return len(rows)

          total=0

          print("=== Migros CH ===")
          pdf=download_migros_pdf()
          if pdf:
            print("PDF downloaded: "+str(len(pdf))+" bytes")
            images=pdf_to_images(pdf,max_pages=8)
            print("Pages converted: "+str(len(images)))
            all_items=[]
            for i,img in enumerate(images):
              print("Processing page "+str(i+1))
              b64=image_to_base64(img)
              items=extract_offers_from_image(b64,"Migros","CHF")
              print("Page "+str(i+1)+": "+str(len(items))+" items")
              all_items.extend(items)
            total+=save_offers(all_items,"migros_ch","Migros","CH","CHF")
          else:
            print("No Migros PDF found")

          print("=== Coop CH ===")
          pdf2=download_coop_pdf()
          if pdf2:
            print("Coop PDF: "+str(len(pdf2))+" bytes")
            images2=pdf_to_images(pdf2,max_pages=8)
            all_items2=[]
            for i,img in enumerate(images2):
              b64=image_to_base64(img)
              items=extract_offers_from_image(b64,"Coop","CHF")
              all_items2.extend(items)
            total+=save_offers(all_items2,"coop_ch","Coop","CH","CHF")
          else:
            print("No Coop PDF found")

          print("Total CH offers saved: "+str(total))
          ENDOFSCRIPT
          python3 /tmp/fetch_ch.py
