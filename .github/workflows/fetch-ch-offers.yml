name: Fetch CH Supermarket Offers

on:
  schedule:
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  fetch-ch-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Fetch CH offers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cat > /tmp/fetch_ch.py << 'ENDOFSCRIPT'
          import os,re,json,requests
          from supabase import create_client
          from datetime import datetime,timedelta
          sb=create_client(os.environ["SUPABASE_URL"],os.environ["SUPABASE_KEY"])
          SB_URL=os.environ["SUPABASE_URL"]
          SB_KEY=os.environ["SUPABASE_KEY"]
          WEEK_END=(datetime.utcnow()+timedelta(days=7)).strftime("%Y-%m-%d")
          def get_migros_token():
            try:
              r=requests.get("https://www.migros.ch/de",headers={"User-Agent":"Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X)"},timeout=10,allow_redirects=True)
              cookies=r.headers.get("set-cookie","")
              m=re.search("leshopch=([^;]+)",cookies)
              if m: print("Got Migros token"); return m.group(1)
            except Exception as e: print("Token err:"+str(e))
            return None
          def fetch_migros(token):
            try:
              headers={"User-Agent":"Mozilla/5.0","Accept":"application/json","Accept-Language":"de-CH"}
              if token: headers["Cookie"]="leshopch="+token
              r=requests.get("https://www.migros.ch/product-display/public/web/v2/products/promotion/search",params={"pageSize":100,"currentPage":0},headers=headers,timeout=15)
              print("Migros status:"+str(r.status_code))
              if r.status_code==200:
                data=r.json()
                print("Migros keys:"+str(list(data.keys())))
                return data.get("products",data.get("results",[]))
            except Exception as e: print("Migros err:"+str(e))
            return []
          def fetch_aldi():
            try:
              r=requests.get("https://www.aldi-now.ch/api/offers",params={"pageSize":50,"page":1},headers={"User-Agent":"Mozilla/5.0","Accept":"application/json"},timeout=15)
              print("Aldi status:"+str(r.status_code))
              if r.status_code==200:
                data=r.json()
                print("Aldi keys:"+str(list(data.keys())))
                return data.get("offers",data.get("items",data.get("results",[])))
            except Exception as e: print("Aldi err:"+str(e))
            return []
          def fetch_denner():
            try:
              reg=requests.post("https://www.denner.ch/api/v1/clients",json={"platform":"ios","version":"6.0"},headers={"User-Agent":"Denner/6.0","Content-Type":"application/json"},timeout=10)
              print("Denner reg:"+str(reg.status_code))
              token=""
              if reg.status_code in [200,201]:
                d=reg.json()
                token=d.get("token",d.get("access_token",""))
              headers={"User-Agent":"Denner/6.0","Accept":"application/json"}
              if token: headers["Authorization"]="Bearer "+token
              r=requests.get("https://www.denner.ch/api/v1/promotions",params={"limit":50},headers=headers,timeout=15)
              print("Denner status:"+str(r.status_code))
              if r.status_code==200:
                data=r.json()
                return data.get("promotions",data.get("offers",data.get("results",[])))
            except Exception as e: print("Denner err:"+str(e))
            return []
          def parse(item,store_name,store_id):
            name=item.get("name",item.get("title",item.get("description","")))
            price_obj=item.get("price",{})
            if isinstance(price_obj,dict):
              price=float(price_obj.get("current",price_obj.get("regular",0)) or 0)
              old_price=float(price_obj.get("original",price) or price)
            else:
              price=float(price_obj or 0)
              old_price=float(item.get("oldPrice",item.get("regularPrice",price)) or price)
            if not name or not price: return None
            image_url=item.get("imageUrl",item.get("image",{}).get("url","") if isinstance(item.get("image"),dict) else "")
            unit=str(item.get("unit",item.get("quantityUnit","pcs")))
            valid_until=item.get("promotionEndDate","")[:10] if item.get("promotionEndDate") else WEEK_END
            pid=re.sub("[^a-z0-9]+","_",name.lower()).strip("_")[:50]
            return {"store_id":store_id,"store_name":store_name,"store_flag":"CH","product_id":pid,"product_name":name,"price":price,"old_price":old_price,"offer_id":str(item.get("id","")),"image_url":image_url,"currency":"CHF","unit":unit,"valid_until":valid_until,"created_at":datetime.utcnow().isoformat()}
          def save(rows,store_id):
            if not rows: print("No rows for "+store_id); return 0
            sb.table("prices").delete().eq("store_id",store_id).execute()
            sb.table("prices").insert(rows).execute()
            print("Saved "+str(len(rows))+" "+store_id+" offers!")
            return len(rows)
          total=0
          print("=== Migros CH ===")
          token=get_migros_token()
          raw=fetch_migros(token)
          print("Raw Migros:"+str(len(raw)))
          rows=[x for x in [parse(p,"Migros","migros_ch") for p in raw] if x]
          total+=save(rows,"migros_ch")
          print("=== Aldi CH ===")
          raw=fetch_aldi()
          print("Raw Aldi:"+str(len(raw)))
          rows=[x for x in [parse(p,"Aldi","aldi_ch") for p in raw] if x]
          total+=save(rows,"aldi_ch")
          print("=== Denner CH ===")
          raw=fetch_denner()
          print("Raw Denner:"+str(len(raw)))
          rows=[x for x in [parse(p,"Denner","denner_ch") for p in raw] if x]
          total+=save(rows,"denner_ch")
          print("Total CH offers:"+str(total))
          ENDOFSCRIPT
          python3 /tmp/fetch_ch.py
