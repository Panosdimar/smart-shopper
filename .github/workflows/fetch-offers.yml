name: Fetch Supermarket Offers

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  fetch-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Write and run script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cat > /tmp/fetch.py << 'ENDOFSCRIPT'
          import os,re,json,requests
          from supabase import create_client
          from datetime import datetime,timedelta
          sb=create_client(os.environ["SUPABASE_URL"],os.environ["SUPABASE_KEY"])
          SB_URL=os.environ["SUPABASE_URL"]
          SB_KEY=os.environ["SUPABASE_KEY"]
          ZIP="79639"
          STORE_MAP={"lidl":"lidl_de","aldi":"aldi_de","rewe":"rewe_de","edeka":"edeka_de","kaufland":"kaufland_de","penny":"penny_de","migros":"migros_ch","coop":"coop_ch","denner":"denner_ch"}
          CH_ZIP="4001"
          PRODUCTS=["Milch","Eier","Butter","Joghurt","Haehnchen","Hackfleisch","Lachs","Wurst","Brot","Nudeln","Reis","Apfel","Banane","Tomate","Kartoffel","Wasser","Kaffee","Chips","Schokolade"]
          def get_key():
            try:
              r=requests.get("https://www.marktguru.de/",timeout=10,headers={"User-Agent":"Mozilla/5.0"})
              m=re.search(r'"apiKey"\s*:\s*"([^"]+)"',r.text)
              if m: return m.group(1)
            except: pass
            return "mg-api-key"
          def upload_image(offer_id,mg_url):
            try:
              r=requests.get(mg_url,timeout=10,headers={"User-Agent":"Mozilla/5.0","Referer":"https://www.marktguru.de/"})
              if r.status_code==200 and len(r.content)>1000:
                path="offers/"+offer_id+".jpg"
                url=SB_URL+"/storage/v1/object/offer-images/"+path
                hdrs={"Authorization":"Bearer "+SB_KEY,"Content-Type":"image/jpeg","x-upsert":"true"}
                resp=requests.post(url,data=r.content,headers=hdrs,timeout=15)
                print("upload status:"+str(resp.status_code)+" "+resp.text[:100])
                if resp.status_code in [200,201]:
                  return SB_URL+"/storage/v1/object/public/offer-images/"+path
            except Exception as e: print("img err:"+str(e))
            print("img status: "+str(r.status_code if 'r' in dir() else 'no response')+" len:"+str(len(r.content) if 'r' in dir() else 0))
            return ""
          def search(q,key):
            results=[]
            for zip_code in [ZIP,"4001"]:
              try:
                r=requests.get("https://api.marktguru.de/api/v1/offers/search",headers={"x-apikey":key,"accept":"application/json"},params={"as":"web","limit":15,"q":q,"zipCode":zip_code},timeout=10)
                if r.status_code==200:
                  results.extend(r.json().get("results",[]))
              except Exception as e: print("err:"+str(e))
            return results
          def fetch_migros():
            try:
              url="https://www.migros.ch/product-display/public/web/v2/products/promotion/search"
              headers={"User-Agent":"Mozilla/5.0","Accept":"application/json","Accept-Language":"de-CH"}
              params={"pageSize":100,"currentPage":0}
              r=requests.get(url,headers=headers,params=params,timeout=15)
              print("Migros status: "+str(r.status_code))
              if r.status_code==200:
                data=r.json()
                print("Migros keys: "+str(list(data.keys())))
                return data.get("products",data.get("results",[]))
            except Exception as e: print("Migros err:"+str(e))
            return []
          def parse(offers):
            rows,seen=[],set()
            week_end=(datetime.utcnow()+timedelta(days=7)).strftime("%Y-%m-%d")
            for o in offers:
              try:
                name=o.get("description",o.get("product",{}).get("name",""))
                price=float(o.get("price",0) or 0)
                old_price=float(o.get("oldPrice") or o.get("referencePrice") or price)
                offer_id=str(o.get("id",""))
                mg_image="https://cdn.marktguru.de/api/v1/offers/"+offer_id+"/images/default/0/medium.webp"
                ads=o.get("advertisers",[])
                if not ads: continue
                store_name=ads[0].get("name","")
                unit_obj=o.get("unit",{})
                unit=unit_obj.get("shortName","pcs") if isinstance(unit_obj,dict) else "pcs"
                validity=o.get("validityDates",[])
                valid_until=validity[0].get("to",week_end)[:10] if validity else week_end
                if not name or not price or not store_name: continue
                store_id=next((sid for k,sid in STORE_MAP.items() if k in store_name.lower()),None)
                if not store_id: continue
                pid=re.sub("[^a-z0-9]+","_",name.lower()).strip("_")[:50]
                if pid+"_"+store_id in seen: continue
                seen.add(pid+"_"+store_id)
                image_url=upload_image(offer_id,mg_image)
                rows.append({"store_id":store_id,"store_name":store_name,"store_flag":"DE","product_id":pid,"product_name":name,"price":price,"old_price":old_price,"offer_id":offer_id,"image_url":image_url,"currency":"EUR","unit":unit,"valid_until":valid_until,"created_at":datetime.utcnow().isoformat()})
              except Exception as e: print("err:"+str(e))
            return rows
          key=get_key()
          print("Key: "+key[:10])
          all_offers=[]
          for p in PRODUCTS:
            offers=search(p,key)
            all_offers.extend(offers)
            print(p+": "+str(len(offers)))
            ch_offers=fetch_migros()
            all_offers.extend(ch_offers)
            print("Migros CH: "+str(len(ch_offers)))
          rows=parse(all_offers)
          print("Parsed: "+str(len(rows)))
          if rows:
            for sid in set(r["store_id"] for r in rows):
              sb.table("prices").delete().eq("store_id",sid).execute()
            sb.table("prices").insert(rows).execute()
            print("Saved "+str(len(rows))+"!")
          ENDOFSCRIPT
          python3 /tmp/fetch.py
