<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Smart Shopper">
<meta name="theme-color" content="#07111a">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Shopper — Voice</title>
<style>
/* Όλο το CSS σου παρέμεινε ίδιο (δεν το αλλάζω για να μην γίνει τεράστιο) */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111111;
  --card:#1C1C1E;
  --card2:#2C2C2E;
  --border:rgba(255,255,255,0.10);
  --border2:rgba(255,255,255,0.06);
  --text:#F5F5F7;
  --text2:#A1A1A6;
  --text3:#6E6E73;
  --green:#30D1C8;
  --orange:#FF9F0A;
  --blue:#0A84FF;
  --red:#FF453A;
}
html{font-size:17px;scroll-padding-bottom:130px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',Arial,sans-serif;
  min-height:100vh;
  padding-bottom:120px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
input,button,select,textarea{font-family:inherit;font-size:17px;line-height:1.5;}

/* ... (όλο το υπόλοιπο CSS σου μένει ακριβώς ίδιο μέχρι το τέλος) ... */

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(17,17,17,0.98);
  border-top:1px solid var(--border2);
  display:flex;
  padding:10px 0 max(16px,env(safe-area-inset-bottom));
  z-index:9999;
  backdrop-filter:blur(20px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;background:none;border:none;
  color:var(--text3);cursor:pointer;
  font-size:11px;font-weight:500;
  padding:6px 0;min-height:52px;
}
.nav-btn.active{color:var(--green)}
.nav-btn .nav-icon{font-size:22px;line-height:1}

/* Scan styles */
.scan-step{display:none;padding:20px 16px 130px;max-width:680px;margin:0 auto}
.scan-step.active{display:block}
.camera-wrap{
  position:relative;background:#000;
  border-radius:14px;overflow:hidden;
  width:100%;max-height:340px;aspect-ratio:4/3;
}
#scanVideo{width:100%;height:100%;object-fit:cover;display:block}
.scan-overlay{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;pointer-events:none;
}
.scan-frame{
  width:80%;height:160px;
  border:2.5px solid var(--green);border-radius:12px;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative;
}
.scan-line{
  position:absolute;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  animation:scanline 1.8s ease-in-out infinite;top:0;
}
@keyframes scanline{0%{top:0;opacity:1}50%{opacity:0.7}100%{top:calc(100% - 2px);opacity:1}}
.scan-label{
  position:absolute;bottom:10px;left:0;right:0;
  text-align:center;font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;
}
.scan-status{
  position:absolute;top:10px;left:0;right:0;
  text-align:center;font-size:13px;color:var(--green);font-weight:600;
}
.btn-scan{
  width:100%;background:var(--green);color:#000;
  border:none;border-radius:13px;padding:15px 0;
  font-size:17px;font-weight:700;cursor:pointer;
  margin-top:12px;display:flex;align-items:center;
  justify-content:center;gap:9px;min-height:52px;
}
.btn-scan.stop{background:var(--red);color:#fff}
</style>
</head>
<body>

<!-- Όλο το HTML σου μέχρι το </div> του container μένει ίδιο -->

<!-- Το script σου μέχρι το τέλος του shopper μέρους μένει ίδιο -->

<script>
// ... (όλος ο κώδικας μέχρι το τέλος του shopper μέρους) ...

// ─────────────────────────────────────────────────────────────
// NUTRISCAN — ΔΙΟΡΘΩΜΕΝΗ ΈΚΔΟΣΗ
// ─────────────────────────────────────────────────────────────

var scanState = {
  active: false,
  stream: null,
  recognizer: null,
  cooldown: false,
  history: []
};

try { 
  scanState.history = JSON.parse(localStorage.getItem('ns_history')||'[]'); 
} catch(e){}

// Tab switcher
function switchMainTab(tab) {
  scanState.currentTab = tab;
  if (tab !== 'scan' && scanState.active) stopScan();

  document.querySelector('.container').style.display = (tab === 'shopper') ? 'block' : 'none';
  document.getElementById('mainScan').classList.toggle('active', tab === 'scan');
  document.getElementById('mainHistory').classList.toggle('active', tab === 'history');

  ['shopper','scan','history'].forEach(t => {
    const btn = document.getElementById('nav'+t.charAt(0).toUpperCase()+t.slice(1));
    if (btn) btn.classList.toggle('active', t === tab);
  });
}

// Start / Stop Scan
async function toggleScan() {
  if (scanState.active) {
    stopScan();
  } else {
    startScan();
  }
}

async function startScan() {
  const statusEl = document.getElementById('scanStatus');
  const labelEl = document.getElementById('scanLabel');
  const captureBtn = document.getElementById('captureBtn');

  statusEl.textContent = 'Ανοίγει κάμερα...';
  statusEl.style.color = 'var(--green)';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    const video = document.getElementById('scanVideo');
    video.srcObject = stream;
    scanState.stream = stream;
    scanState.active = true;

    const scanBtn = document.getElementById('scanBtn');
    scanBtn.className = 'btn-scan stop';
    document.getElementById('scanBtnIcon').textContent = '⏹';
    document.getElementById('scanBtnText').textContent = 'Stop';

    await video.play();

    statusEl.textContent = '✅ Κάμερα ενεργή';
    labelEl.textContent = 'Τοποθέτησε το barcode στο πλαίσιο';

    if ('BarcodeDetector' in window) {
      scanWithBarcodeDetector(video);
    } else {
      captureBtn.style.display = 'block';
    }

  } catch (err) {
    console.error(err);
    scanState.active = false;
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = 'Σφάλμα κάμερας';

    if (err.name === 'NotAllowedError') {
      document.getElementById('scanResult').innerHTML = `
        <div style="background:rgba(255,69,58,0.1);border:1px solid #FF6961;border-radius:14px;padding:18px;color:#FF6961">
          <strong>Η κάμερα είναι απενεργοποιημένη</strong><br><br>
          iPhone: Ρυθμίσεις → Safari → Κάμερα → Επιτρέπεται<br>
          Android: Κάνε tap στο 🔒 και δώσε άδεια
        </div>`;
    }
  }
}

function stopScan() {
  if (scanState.stream) {
    scanState.stream.getTracks().forEach(track => track.stop());
    scanState.stream = null;
  }
  const video = document.getElementById('scanVideo');
  if (video) video.srcObject = null;

  scanState.active = false;

  const scanBtn = document.getElementById('scanBtn');
  scanBtn.className = 'btn-scan';
  document.getElementById('scanBtnIcon').textContent = '📷';
  document.getElementById('scanBtnText').textContent = 'Start Camera';

  document.getElementById('captureBtn').style.display = 'none';
  document.getElementById('scanStatus').textContent = '';
}

// BarcodeDetector (ζωντανή ανίχνευση)
async function scanWithBarcodeDetector(video) {
  if (!('BarcodeDetector' in window)) return;

  const detector = new BarcodeDetector({ 
    formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'itf'] 
  });

  const check = async () => {
    if (!scanState.active) return;

    try {
      const codes = await detector.detect(video);
      if (codes.length > 0 && !scanState.cooldown) {
        scanState.cooldown = true;
        handleBarcodeFound(codes[0].rawValue);
        setTimeout(() => { scanState.cooldown = false; }, 1500);
      }
    } catch (e) {}

    requestAnimationFrame(check);
  };

  check();
}

// Capture button (για Safari)
function doCapture() {
  const video = document.getElementById('scanVideo');
  const canvas = document.getElementById('scanCanvas');
  const statusEl = document.getElementById('scanStatus');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  statusEl.textContent = 'Ανάλυση...';

  // Προσπάθεια με BarcodeDetector πρώτα
  if ('BarcodeDetector' in window) {
    new BarcodeDetector().detect(canvas)
      .then(codes => {
        if (codes.length > 0) handleBarcodeFound(codes[0].rawValue);
        else statusEl.textContent = 'Δεν βρέθηκε barcode — δοκίμασε ξανά';
      })
      .catch(() => fallbackScan(canvas, statusEl));
  } else {
    fallbackScan(canvas, statusEl);
  }
}

function fallbackScan(canvas, statusEl) {
  statusEl.textContent = 'Χρήση εναλλακτικού scanner...';
  // Εδώ μπορείς να βάλεις Quagga ή ZXing αν θέλεις στο μέλλον
  statusEl.textContent = 'Δεν υποστηρίζεται αυτό το browser. Χρησιμοποίησε το χειροκίνητο πεδίο.';
}

// Όταν βρεθεί barcode
function handleBarcodeFound(code) {
  if (navigator.vibrate) navigator.vibrate([70, 30, 70]);

  document.getElementById('scanStatus').innerHTML = `✅ <b>${code}</b>`;
  document.getElementById('scanLabel').textContent = 'Βρέθηκε! Φόρτωση προϊόντος...';

  stopScan();           // Σταματάμε αμέσως την κάμερα
  lookupBarcodeCode(code);
}

// Lookup & Render (παρέμεινε ίδιο με μικρές βελτιώσεις)
async function lookupBarcodeCode(code) {
  // ... (ο κώδικας lookup που είχες μένει ίδιος, μόνο το showScanResult καλείται σωστά)

  showScanResult('<div style="padding:40px 20px;text-align:center"><div style="margin:0 auto 16px;width:40px;height:40px;border:4px solid #333;border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite"></div><div>Αναζήτηση στο Open Food Facts...</div></div>');

  try {
    const resp = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}?fields=product_name,brands,quantity,image_url,nutriscore_grade,nova_group,nutriments,allergens_tags,ingredients_text,ecoscore_grade,labels_tags`);
    const data = await resp.json();

    if (data.status !== 1 || !data.product) {
      showScanResult(`<div style="background:#1C1C1E;border-radius:14px;padding:20px;color:#FF6961">Το προϊόν με barcode <b>${code}</b> δεν βρέθηκε.</div>`);
      return;
    }

    renderNutriProduct(data.product);

  } catch(e) {
    showScanResult('<div style="color:#FF6961;padding:20px">Σφάλμα σύνδεσης. Δοκίμασε ξανά.</div>');
  }
}

// Βοηθητικές συναρτήσεις (esc, showScanResult, renderNutriProduct κλπ.) μένουν όπως τις είχες

// Προσθήκη animation για spinner
const style = document.createElement('style');
style.innerHTML = `@keyframes spin { to { transform: rotate(360deg); } }`;
document.head.appendChild(style);

// Init
renderCategories();
updateItemCount();

// Κλείσιμο κάμερας όταν κλείνει η εφαρμογή/σελίδα
window.addEventListener('beforeunload', () => { if(scanState.active) stopScan(); });
document.addEventListener('visibilitychange', () => {
  if (document.hidden && scanState.active) stopScan();
});
</script>

<!-- Bottom Nav + Scan + History tabs (παρέμειναν ίδια) -->

<nav class="bottom-nav">
  <button class="nav-btn active" id="navShopper" onclick="switchMainTab('shopper')"><span class="nav-icon">🛒</span><span>Shopper</span></button>
  <button class="nav-btn" id="navScan" onclick="switchMainTab('scan')"><span class="nav-icon">📷</span><span>NutriScan</span></button>
  <button class="nav-btn" id="navHistory" onclick="switchMainTab('history')"><span class="nav-icon">🕐</span><span>History</span></button>
</nav>

<div class="scan-step" id="mainScan"> ... (το HTML του scanner σου μένει ίδιο) ... </div>
<div class="scan-step" id="mainHistory"> ... </div>

</body>
</html>
